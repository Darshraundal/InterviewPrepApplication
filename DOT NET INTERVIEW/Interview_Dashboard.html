<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>.NET Interview Mastery Dashboard — Darshan</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f172a;
    --bg-2: #1e293b;
    --bg-3: #334155;
    --border: #334155;
    --text: #f1f5f9;
    --text-2: #94a3b8;
    --text-3: #64748b;
    --accent: #3b82f6;
    --accent-2: #60a5fa;
    --success: #10b981;
    --warning: #f59e0b;
    --danger: #ef4444;
    --learning: #f59e0b;
    --mastered: #10b981;
    --not-started: #64748b;
    --shadow: 0 4px 6px -1px rgba(0,0,0,0.3);
    --radius: 12px;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
  }
  .app {
    display: grid;
    grid-template-columns: 280px 1fr;
    min-height: 100vh;
  }
  /* Sidebar */
  .sidebar {
    background: var(--bg-2);
    border-right: 1px solid var(--border);
    padding: 24px 16px;
    overflow-y: auto;
    position: sticky;
    top: 0;
    height: 100vh;
  }
  .sidebar-header {
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-header h1 {
    font-size: 18px;
    font-weight: 700;
    background: linear-gradient(135deg, #60a5fa, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 4px;
  }
  .sidebar-header p {
    font-size: 12px;
    color: var(--text-3);
  }
  .overall-progress {
    background: var(--bg-3);
    padding: 16px;
    border-radius: var(--radius);
    margin-bottom: 24px;
  }
  .overall-progress h3 {
    font-size: 12px;
    color: var(--text-2);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 8px;
  }
  .progress-stats {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 8px;
  }
  .progress-stats .big {
    font-size: 28px;
    font-weight: 700;
    color: var(--text);
  }
  .progress-stats .total {
    font-size: 14px;
    color: var(--text-3);
  }
  .progress-bar {
    height: 8px;
    background: var(--bg);
    border-radius: 4px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--mastered), #34d399);
    transition: width 0.4s ease;
  }
  .progress-bar-fill.partial {
    background: linear-gradient(90deg, var(--learning), #fbbf24);
  }
  .progress-breakdown {
    display: flex;
    gap: 8px;
    margin-top: 8px;
    font-size: 11px;
  }
  .progress-breakdown span {
    color: var(--text-3);
  }
  .progress-breakdown .m { color: var(--mastered); }
  .progress-breakdown .l { color: var(--learning); }
  .nav-list {
    list-style: none;
  }
  .nav-item {
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 2px;
  }
  .nav-item:hover { background: var(--bg-3); }
  .nav-item.active {
    background: var(--accent);
    color: white;
  }
  .nav-item-label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
  }
  .nav-item-emoji { font-size: 16px; }
  .nav-item-count {
    background: rgba(255,255,255,0.1);
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 600;
  }
  .nav-item.active .nav-item-count {
    background: rgba(255,255,255,0.25);
  }
  .nav-item-bar {
    height: 3px;
    background: var(--bg);
    border-radius: 2px;
    margin-top: 4px;
    overflow: hidden;
  }
  .nav-item-bar-fill {
    height: 100%;
    background: var(--mastered);
    transition: width 0.4s;
  }
  /* Main */
  .main {
    padding: 32px 40px;
    max-width: 1100px;
    margin: 0 auto;
    width: 100%;
  }
  .toolbar {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
    align-items: center;
  }
  .search-box {
    flex: 1;
    min-width: 240px;
    position: relative;
  }
  .search-box input {
    width: 100%;
    background: var(--bg-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 16px 10px 40px;
    border-radius: 8px;
    font-size: 14px;
    transition: border-color 0.15s;
  }
  .search-box input:focus {
    outline: none;
    border-color: var(--accent);
  }
  .search-box::before {
    content: "🔍";
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0.5;
  }
  .filter-pills {
    display: flex;
    gap: 6px;
  }
  .filter-pill {
    padding: 8px 14px;
    border: 1px solid var(--border);
    background: var(--bg-2);
    color: var(--text-2);
    border-radius: 20px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-pill:hover { background: var(--bg-3); color: var(--text); }
  .filter-pill.active {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }
  .filter-pill.m.active { background: var(--mastered); border-color: var(--mastered); }
  .filter-pill.l.active { background: var(--learning); border-color: var(--learning); }
  .filter-pill.n.active { background: var(--not-started); border-color: var(--not-started); }
  .btn-reset {
    padding: 8px 14px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-3);
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-reset:hover { color: var(--danger); border-color: var(--danger); }
  .category-header {
    margin-bottom: 24px;
  }
  .category-header h2 {
    font-size: 28px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 6px;
  }
  .category-header p {
    color: var(--text-2);
    font-size: 14px;
  }
  .question-card {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 12px;
    overflow: hidden;
    transition: border-color 0.15s;
  }
  .question-card.mastered { border-left: 4px solid var(--mastered); }
  .question-card.learning { border-left: 4px solid var(--learning); }
  .question-card.not-started { border-left: 4px solid var(--not-started); }
  .question-header {
    padding: 16px 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    user-select: none;
  }
  .question-header:hover { background: rgba(255,255,255,0.02); }
  .question-title {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .question-number {
    font-size: 12px;
    color: var(--text-3);
    font-weight: 600;
    min-width: 60px;
  }
  .question-text {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
  }
  .question-meta {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .badge {
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }
  .badge.freq-vh { background: rgba(239,68,68,0.15); color: #fca5a5; }
  .badge.freq-h { background: rgba(245,158,11,0.15); color: #fcd34d; }
  .badge.freq-m { background: rgba(59,130,246,0.15); color: #93c5fd; }
  .badge.freq-l { background: rgba(100,116,139,0.15); color: #94a3b8; }
  .badge.diff-easy { background: rgba(16,185,129,0.15); color: #6ee7b7; }
  .badge.diff-medium { background: rgba(245,158,11,0.15); color: #fcd34d; }
  .badge.diff-hard { background: rgba(239,68,68,0.15); color: #fca5a5; }
  .expand-icon {
    transition: transform 0.2s;
    color: var(--text-3);
    font-size: 12px;
  }
  .question-card.open .expand-icon { transform: rotate(180deg); }
  .question-body {
    display: none;
    padding: 0 20px 20px 20px;
    border-top: 1px solid var(--border);
  }
  .question-card.open .question-body { display: block; }
  .section-label {
    font-size: 11px;
    color: var(--accent-2);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 700;
    margin: 20px 0 8px 0;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .section-label::before {
    content: "";
    width: 3px;
    height: 12px;
    background: var(--accent);
    border-radius: 2px;
  }
  .answer-text {
    color: var(--text);
    font-size: 14px;
    line-height: 1.7;
  }
  .answer-text p { margin-bottom: 8px; }
  .answer-text ul { margin: 8px 0 8px 20px; }
  .answer-text li { margin-bottom: 4px; }
  .answer-text strong { color: var(--accent-2); }
  .project-example {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    margin-top: 8px;
  }
  .project-tag {
    display: inline-block;
    background: var(--accent);
    color: white;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 4px;
    font-weight: 700;
    margin-right: 8px;
    text-transform: uppercase;
  }
  .project-tag.realtime { background: #a855f7; }
  .project-file {
    font-family: "Cascadia Code", Consolas, Monaco, monospace;
    font-size: 12px;
    color: var(--warning);
    margin-bottom: 8px;
  }
  .code-block {
    background: #020617;
    border-radius: 6px;
    padding: 12px 14px;
    margin: 8px 0;
    overflow-x: auto;
    font-family: "Cascadia Code", Consolas, Monaco, monospace;
    font-size: 12.5px;
    line-height: 1.5;
    color: #e2e8f0;
    border: 1px solid #1e293b;
  }
  .code-block .kw { color: #c084fc; }
  .code-block .str { color: #86efac; }
  .code-block .cmt { color: #64748b; font-style: italic; }
  .code-block .typ { color: #fcd34d; }
  .project-explanation {
    color: var(--text-2);
    font-size: 13px;
    margin-top: 8px;
  }
  .followups {
    list-style: none;
    padding-left: 0;
  }
  .followups li {
    padding: 6px 0 6px 22px;
    position: relative;
    color: var(--text-2);
    font-size: 13px;
  }
  .followups li::before {
    content: "→";
    position: absolute;
    left: 0;
    color: var(--accent-2);
  }
  .tip-box {
    background: linear-gradient(135deg, rgba(59,130,246,0.08), rgba(168,85,247,0.08));
    border-left: 3px solid var(--accent);
    padding: 12px 14px;
    border-radius: 6px;
    font-size: 13px;
    color: var(--text);
    margin-top: 8px;
  }
  .tip-box::before {
    content: "💡 ";
  }
  .status-bar {
    display: flex;
    gap: 8px;
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }
  .status-btn {
    flex: 1;
    padding: 10px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-2);
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.15s;
  }
  .status-btn:hover { background: var(--bg-3); color: var(--text); }
  .status-btn.active.not-started { background: var(--not-started); color: white; border-color: var(--not-started); }
  .status-btn.active.learning { background: var(--learning); color: white; border-color: var(--learning); }
  .status-btn.active.mastered { background: var(--mastered); color: white; border-color: var(--mastered); }
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-3);
  }
  .empty-state .emoji { font-size: 48px; margin-bottom: 16px; }
  .empty-state h3 { color: var(--text); margin-bottom: 8px; }
  .error-banner {
    background: rgba(239,68,68,0.1);
    border: 1px solid var(--danger);
    color: #fca5a5;
    padding: 16px 20px;
    border-radius: var(--radius);
    margin-bottom: 20px;
  }
  .error-banner h3 { margin-bottom: 8px; }
  .error-banner code {
    background: rgba(0,0,0,0.3);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 12px;
  }
  @media (max-width: 900px) {
    .app { grid-template-columns: 1fr; }
    .sidebar {
      position: relative;
      height: auto;
      max-height: 60vh;
    }
    .main { padding: 20px; }
  }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--bg-3); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #475569; }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-header">
      <h1>📚 Interview Mastery</h1>
      <p>5-Year .NET Developer Prep</p>
    </div>
    <div class="overall-progress">
      <h3>Overall Progress</h3>
      <div class="progress-stats">
        <span class="big" id="masteredCount">0</span>
        <span class="total">/ <span id="totalCount">0</span> mastered</span>
      </div>
      <div class="progress-bar">
        <div class="progress-bar-fill" id="overallBar" style="width: 0%"></div>
      </div>
      <div class="progress-breakdown">
        <span class="m">● <span id="mCount">0</span> mastered</span>
        <span class="l">● <span id="lCount">0</span> learning</span>
        <span>● <span id="nCount">0</span> to do</span>
      </div>
    </div>
    <ul class="nav-list" id="navList"></ul>
  </aside>
  <main class="main">
    <div id="content"></div>
  </main>
</div>

<script src="questions.js"></script>
<script>
(function() {
  'use strict';

  const STORAGE_KEY = 'interview_progress_v1';
  let state = {
    currentCategory: null,
    searchQuery: '',
    statusFilter: 'all',
    progress: {}
  };

  // ===== Storage =====
  function loadProgress() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      state.progress = raw ? JSON.parse(raw) : {};
    } catch (e) { state.progress = {}; }
  }
  function saveProgress() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.progress));
    } catch (e) { console.error('localStorage save failed', e); }
  }
  function setStatus(qid, status) {
    if (status === 'not-started') delete state.progress[qid];
    else state.progress[qid] = status;
    saveProgress();
    render();
  }
  function getStatus(qid) {
    return state.progress[qid] || 'not-started';
  }
  function resetAll() {
    if (!confirm('Reset all progress? This cannot be undone.')) return;
    state.progress = {};
    saveProgress();
    render();
  }

  // ===== Counts =====
  function getCategoryCounts(catId) {
    const qs = QUESTIONS_DATA.questions.filter(q => q.category === catId);
    let mastered = 0, learning = 0;
    qs.forEach(q => {
      const s = getStatus(q.id);
      if (s === 'mastered') mastered++;
      else if (s === 'learning') learning++;
    });
    return { total: qs.length, mastered, learning, notStarted: qs.length - mastered - learning };
  }
  function getOverallCounts() {
    let mastered = 0, learning = 0;
    QUESTIONS_DATA.questions.forEach(q => {
      const s = getStatus(q.id);
      if (s === 'mastered') mastered++;
      else if (s === 'learning') learning++;
    });
    const total = QUESTIONS_DATA.questions.length;
    return { total, mastered, learning, notStarted: total - mastered - learning };
  }

  // ===== Filtering =====
  function filterQuestions(catId) {
    let qs = catId
      ? QUESTIONS_DATA.questions.filter(q => q.category === catId)
      : QUESTIONS_DATA.questions;
    if (state.searchQuery) {
      const q = state.searchQuery.toLowerCase();
      qs = qs.filter(item =>
        item.question.toLowerCase().includes(q) ||
        (item.answer && item.answer.toLowerCase().includes(q)) ||
        (item.tags && item.tags.some(t => t.toLowerCase().includes(q)))
      );
    }
    if (state.statusFilter !== 'all') {
      qs = qs.filter(item => getStatus(item.id) === state.statusFilter);
    }
    return qs;
  }

  // ===== HTML helpers =====
  function esc(s) {
    if (s == null) return '';
    return String(s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }
  function highlightCode(code) {
    if (!code) return '';
    let h = esc(code);
    // Comments first
    h = h.replace(/(\/\/[^\n]*)/g, '<span class="cmt">$1</span>');
    // Strings
    h = h.replace(/("[^"\n]*")/g, '<span class="str">$1</span>');
    // Keywords
    const kws = ['public','private','protected','internal','static','readonly','const','class','interface','abstract','sealed','override','virtual','new','return','if','else','for','foreach','while','using','namespace','async','await','var','int','string','bool','void','this','base','null','true','false','throw','try','catch','finally','out','ref','params','typeof','nameof','await','async'];
    kws.forEach(kw => {
      h = h.replace(new RegExp('\\b(' + kw + ')\\b', 'g'), '<span class="kw">$1</span>');
    });
    // Types (PascalCase words)
    h = h.replace(/\b([A-Z][a-zA-Z0-9_]*)\b/g, '<span class="typ">$1</span>');
    return h;
  }
  function freqBadge(f) {
    const map = { 'very-high': ['freq-vh','🔥 Very High'], 'high': ['freq-h','High'], 'medium': ['freq-m','Medium'], 'low': ['freq-l','Low'] };
    const v = map[f] || map['medium'];
    return `<span class="badge ${v[0]}">${v[1]}</span>`;
  }
  function diffBadge(d) {
    const map = { 'easy': ['diff-easy','Easy'], 'medium': ['diff-medium','Medium'], 'hard': ['diff-hard','Hard'] };
    const v = map[d] || map['medium'];
    return `<span class="badge ${v[0]}">${v[1]}</span>`;
  }

  // ===== Render =====
  function renderSidebar() {
    const counts = getOverallCounts();
    document.getElementById('masteredCount').textContent = counts.mastered;
    document.getElementById('totalCount').textContent = counts.total;
    document.getElementById('mCount').textContent = counts.mastered;
    document.getElementById('lCount').textContent = counts.learning;
    document.getElementById('nCount').textContent = counts.notStarted;
    const pct = counts.total ? (counts.mastered / counts.total) * 100 : 0;
    const bar = document.getElementById('overallBar');
    bar.style.width = pct + '%';
    bar.className = 'progress-bar-fill' + (pct < 50 ? ' partial' : '');

    const navList = document.getElementById('navList');
    let html = `<li class="nav-item ${state.currentCategory === null ? 'active' : ''}" data-cat="">
      <span class="nav-item-label"><span class="nav-item-emoji">📋</span><span>All Topics</span></span>
      <span class="nav-item-count">${counts.total}</span>
    </li>`;
    QUESTIONS_DATA.categories.forEach(cat => {
      const c = getCategoryCounts(cat.id);
      const pct = c.total ? (c.mastered / c.total) * 100 : 0;
      html += `<li class="nav-item ${state.currentCategory === cat.id ? 'active' : ''}" data-cat="${cat.id}">
        <div style="flex:1;">
          <div style="display:flex; justify-content:space-between; align-items:center; gap:8px;">
            <span class="nav-item-label"><span class="nav-item-emoji">${cat.emoji}</span><span>${esc(cat.name)}</span></span>
            <span class="nav-item-count">${c.mastered}/${c.total}</span>
          </div>
          <div class="nav-item-bar"><div class="nav-item-bar-fill" style="width:${pct}%"></div></div>
        </div>
      </li>`;
    });
    navList.innerHTML = html;
    navList.querySelectorAll('.nav-item').forEach(el => {
      el.addEventListener('click', () => {
        state.currentCategory = el.dataset.cat || null;
        render();
      });
    });
  }

  function renderToolbar() {
    return `
      <div class="toolbar">
        <div class="search-box">
          <input type="text" id="searchInput" placeholder="Search questions, answers, tags..." value="${esc(state.searchQuery)}">
        </div>
        <div class="filter-pills">
          <button class="filter-pill ${state.statusFilter === 'all' ? 'active' : ''}" data-f="all">All</button>
          <button class="filter-pill n ${state.statusFilter === 'not-started' ? 'active' : ''}" data-f="not-started">To Do</button>
          <button class="filter-pill l ${state.statusFilter === 'learning' ? 'active' : ''}" data-f="learning">Learning</button>
          <button class="filter-pill m ${state.statusFilter === 'mastered' ? 'active' : ''}" data-f="mastered">Mastered</button>
        </div>
        <button class="btn-reset" id="resetBtn">Reset Progress</button>
      </div>
    `;
  }

  function renderHeader() {
    if (state.currentCategory === null) {
      const c = getOverallCounts();
      return `<div class="category-header">
        <h2>📋 All Topics</h2>
        <p>${c.total} questions across ${QUESTIONS_DATA.categories.length} categories · ${c.mastered} mastered · ${c.learning} in progress · ${c.notStarted} to do</p>
      </div>`;
    }
    const cat = QUESTIONS_DATA.categories.find(c => c.id === state.currentCategory);
    if (!cat) return '';
    const c = getCategoryCounts(cat.id);
    return `<div class="category-header">
      <h2>${cat.emoji} ${esc(cat.name)}</h2>
      <p>${c.total} questions · ${c.mastered} mastered · ${c.learning} in progress · ${c.notStarted} to do</p>
    </div>`;
  }

  function renderQuestion(q, index) {
    const status = getStatus(q.id);
    const cat = QUESTIONS_DATA.categories.find(c => c.id === q.category);
    let bodyHtml = `<div class="section-label">Answer</div>
      <div class="answer-text">${q.answer || ''}</div>`;
    if (q.projectExample) {
      const pe = q.projectExample;
      const tagClass = pe.source === 'Real-time Example' ? 'realtime' : '';
      bodyHtml += `<div class="section-label">Project Example</div>
        <div class="project-example">
          <div><span class="project-tag ${tagClass}">${esc(pe.source || 'Example')}</span>${pe.file ? `<span class="project-file">${esc(pe.file)}</span>` : ''}</div>
          ${pe.code ? `<pre class="code-block">${highlightCode(pe.code)}</pre>` : ''}
          ${pe.explanation ? `<div class="project-explanation">${pe.explanation}</div>` : ''}
        </div>`;
    }
    if (q.followUps && q.followUps.length) {
      bodyHtml += `<div class="section-label">Follow-up Questions</div>
        <ul class="followups">${q.followUps.map(f => `<li>${esc(f)}</li>`).join('')}</ul>`;
    }
    if (q.tip) {
      bodyHtml += `<div class="section-label">Interview Tip</div>
        <div class="tip-box">${q.tip}</div>`;
    }
    bodyHtml += `<div class="status-bar">
      <button class="status-btn not-started ${status === 'not-started' ? 'active' : ''}" data-qid="${q.id}" data-s="not-started">○ Not Started</button>
      <button class="status-btn learning ${status === 'learning' ? 'active' : ''}" data-qid="${q.id}" data-s="learning">◐ Learning</button>
      <button class="status-btn mastered ${status === 'mastered' ? 'active' : ''}" data-qid="${q.id}" data-s="mastered">● Mastered</button>
    </div>`;

    return `<article class="question-card ${status}" data-qid="${q.id}">
      <div class="question-header">
        <div class="question-title">
          <span class="question-number">#${String(index + 1).padStart(3, '0')}</span>
          <span class="question-text">${esc(q.question)}</span>
        </div>
        <div class="question-meta">
          ${q.frequency ? freqBadge(q.frequency) : ''}
          ${q.difficulty ? diffBadge(q.difficulty) : ''}
          <span class="expand-icon">▼</span>
        </div>
      </div>
      <div class="question-body">${bodyHtml}</div>
    </article>`;
  }

  function render() {
    renderSidebar();
    const content = document.getElementById('content');
    if (!window.QUESTIONS_DATA || !QUESTIONS_DATA.questions) {
      content.innerHTML = `<div class="error-banner">
        <h3>⚠️ Could not load questions.js</h3>
        <p>Make sure <code>questions.js</code> is in the same folder as this HTML file. If you opened the HTML directly (file://), modern browsers should still load it because the script is referenced relatively.</p>
      </div>`;
      return;
    }
    const qs = filterQuestions(state.currentCategory);
    let html = renderHeader() + renderToolbar();
    if (qs.length === 0) {
      html += `<div class="empty-state">
        <div class="emoji">🎯</div>
        <h3>No questions match</h3>
        <p>Try clearing the search or filters.</p>
      </div>`;
    } else {
      html += qs.map((q, i) => renderQuestion(q, i)).join('');
    }
    content.innerHTML = html;

    // Wire up events
    document.querySelectorAll('.question-header').forEach(h => {
      h.addEventListener('click', (e) => {
        if (e.target.closest('.status-btn')) return;
        h.parentElement.classList.toggle('open');
      });
    });
    document.querySelectorAll('.status-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        setStatus(btn.dataset.qid, btn.dataset.s);
      });
    });
    document.querySelectorAll('.filter-pill').forEach(p => {
      p.addEventListener('click', () => {
        state.statusFilter = p.dataset.f;
        render();
      });
    });
    const search = document.getElementById('searchInput');
    if (search) {
      let timer;
      search.addEventListener('input', (e) => {
        clearTimeout(timer);
        timer = setTimeout(() => {
          state.searchQuery = e.target.value;
          render();
          const newSearch = document.getElementById('searchInput');
          if (newSearch) {
            newSearch.focus();
            newSearch.setSelectionRange(newSearch.value.length, newSearch.value.length);
          }
        }, 250);
      });
    }
    const resetBtn = document.getElementById('resetBtn');
    if (resetBtn) resetBtn.addEventListener('click', resetAll);
  }

  // ===== Init =====
  loadProgress();
  render();
})();
</script>
</body>
</html>
