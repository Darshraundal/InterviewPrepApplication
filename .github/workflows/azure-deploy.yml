name: Build & Deploy to Azure

on:
  push:
    branches:
      - master
  workflow_dispatch:        # allows manual trigger from GitHub Actions UI

env:
  DOTNET_VERSION: '8.0.x'
  PROJECT_PATH: 'src/InterviewPrepPortal/InterviewPrepPortal.csproj'
  AZURE_WEBAPP_NAME: 'InterviewPrepApplication'

jobs:
  build-and-deploy:
    runs-on: windows-latest
    permissions:
      id-token: write   # required for OIDC login
      contents: read

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: 🔧 Set up .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 📦 Restore dependencies
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: 🚀 Publish
        run: dotnet publish ${{ env.PROJECT_PATH }} --configuration Release --no-restore --output ./publish

      - name: 🔑 Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ☁️ Deploy to Azure App Service
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: ./publish
